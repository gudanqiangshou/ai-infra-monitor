    cn_name: "Claude全系"
    provider: "Anthropic"
    country: "US"
  - id: "qwen"
    name: "Qwen"
    cn_name: "通义千问全系"
    provider: "Alibaba"
    country: "CN"
  - id: "deepseek"
    name: "DeepSeek"
