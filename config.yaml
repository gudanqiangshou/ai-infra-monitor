# AI 基建投资监控系统配置
project:
  name: "AI Infra Monitor"
  version: "1.0.0"
  github_repo: "gudanqiangshou/ai-infra-monitor"
  github_pages_url: "https://gudanqiangshou.github.io/ai-infra-monitor/"

# 四大云厂商
hyperscalers:
  AMZN:
    name: "Amazon"
    cn_name: "亚马逊"
    cloud_unit: "AWS"
    ticker: "AMZN"
    earnings_quarter_anchor: ["02", "05", "08", "11"]  # 财报月份
  MSFT:
    name: "Microsoft"
    cn_name: "微软"
    cloud_unit: "Azure"
    ticker: "MSFT"
    earnings_quarter_anchor: ["01", "04", "07", "10"]
  GOOGL:
    name: "Alphabet"
    cn_name: "谷歌"
    cloud_unit: "Google Cloud"
    ticker: "GOOGL"
    earnings_quarter_anchor: ["01", "04", "07", "10"]
  META:
    name: "Meta"
    cn_name: "Meta"
    cloud_unit: "FAIR/Reality Labs"
    ticker: "META"
    earnings_quarter_anchor: ["01", "04", "07", "10"]

